<div class="container-fluid">
  <header class="d-flex justify-content-between align-items-center mb-5 px-4 pt-4">
    <div>
      <h1 class="fw-bold m-0" style="letter-spacing: -1px;">Controle <span style="color: #00d4ff;">Fábrica</span></h1>
      <p class="text-muted mb-0" style="font-size: 0.85rem; opacity: 0.7;">Monitoramento de ativos em tempo real</p>
    </div>
    <div class="badge-operador">
      <span class="dot-online" style="width: 8px; height: 8px; display: inline-block; border-radius: 50%; margin-right: 8px;"></span>
      Operador: Fábrica 01
    </div>
  </header>

  <div class="row g-4 px-3">
    <div class="col-md-4 mb-4" *ngFor="let m of machines">
      <div class="card card-maquina h-100">
        <div class="card-body d-flex flex-column">
          
          <div class="d-flex justify-content-between align-items-start mb-4">
            <h5 class="card-title fw-bold m-0" style="color: #fff;">{{ m.nome }}</h5>
            <div class="d-flex align-items-center gap-2">
              <div class="status-dot" [ngClass]="m.status === 'DISPONIVEL' ? 'dot-online' : 'dot-offline'"></div>
              <small class="text-muted" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">
                {{ m.status }}
              </small>
            </div>
          </div>
          
          <p class="text-secondary small mb-4">ID do Ativo: #00{{ m.id }}</p>

          <div class="mt-auto">
            <button *ngIf="m.status === 'DISPONIVEL'" 
                    (click)="abrirSelecaoOF(m)" 
                    class="btn btn-primary w-100 mb-3 py-2 fw-bold" 
                    data-bs-toggle="modal" data-bs-target="#modalSelecaoOF">
              🚀 INICIAR PRODUÇÃO
            </button>

            <button *ngIf="m.status === 'TRABALHANDO'" 
                    (click)="abrirApontamento(m)" 
                    class="btn btn-warning w-100 text-dark fw-bold mb-3 py-2">
              ✅ APONTAR PEÇAS
            </button>

            <div class="d-flex justify-content-end gap-3 pt-3 border-top border-secondary border-opacity-10">
              <button (click)="alterarNome(m.id!)" class="btn btn-link btn-sm text-info opacity-50 p-0" title="Renomear">
                ✏️
              </button>
              <button (click)="alterarStatus(m.id!)" class="btn btn-link btn-sm text-warning opacity-50 p-0" title="Status">
                ⚙️
              </button>
              <button (click)="deletar(m.id!)" class="btn btn-link btn-sm text-danger opacity-50 p-0" title="Excluir">
                🗑️
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
