<div class="container-fluid">
  <header class="d-flex justify-content-between align-items-center mb-5 px-4 pt-4">
    <h2 class="fw-bold text-white m-0">Status das Máquinas</h2>
    <div class="d-flex gap-2 align-items-center">
      <input type="text" [(ngModel)]="novaMaquinaNome" class="form-control-neumorphic py-2 px-3"
        placeholder="NOME DA MÁQUINA" style="max-width: 250px;">
      <button class="btn btn-primary fw-bold px-4" (click)="registrarMaquina(novaMaquinaNome)"
        style="border-radius: 8px; background-color: #007bff;">
        + Add
      </button>
    </div>
  </header>

  <div class="row g-4 px-3 mb-5">
    <div class="col-md-4 mb-4" *ngFor="let m of machines">
      <div class="card card-maquina h-100"
        [style.border-left]="m.status === 'TRABALHANDO' ? '4px solid #007bff' : '4px solid #28a745'">
      </div>
    </div>
  </div>
  <hr class="border-secondary opacity-20 my-5">

  <div class="row justify-content-center pb-5">
    <div class="col-lg-6">
      <div class="card card-maquina p-4">
        <h5 class="fw-bold text-white mb-4">⚙️ IHM Operação</h5>

        <label class="form-label small opacity-50">MÁQUINA EM USO</label>
        <select class="form-control-neumorphic mb-3" [(ngModel)]="maquinaParaIniciar">
          <option [ngValue]="undefined">-- MÁQUINA --</option>
          <option *ngFor="let m of machines" [ngValue]="m">{{ m.nome }}</option>
        </select>

        <label class="form-label small opacity-50">ORDEM DE SERVIÇO (LOTE)</label>
        <select class="form-control-neumorphic mb-4" #selOrdem>
          <option value="">-- LOTE --</option>
          <option *ngFor="let o of orders" [value]="o.ofGerada">{{ o.ofGerada }} - {{ o.nome }}</option>
        </select>

        <div class="of-ativa-display mb-4">
          <p class="mb-1 small">PRODUTO: <span class="text-info">{{ maquinaParaIniciar?.ofAtiva || '-' }}</span></p>
          <p class="mb-0 small">STATUS ATUAL: <span class="text-success">0 / 0 USINADAS</span></p>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-6">
            <button class="btn btn-modelo btn-start w-100" (click)="vincularOrdem(selOrdem.value)">▶ Iniciar</button>
          </div>
          <div class="col-6">
            <button class="btn btn-modelo btn-pause w-100">⏸ Pausa</button>
          </div>
          <div class="col-12">
            <button class="btn btn-modelo btn-maintenance w-100" (click)="manutencao(maquinaParaIniciar!)">⚠️
              Manutenção</button>
          </div>
        </div>

        <div class="d-flex gap-2">
          <input type="number" class="form-control-neumorphic text-center" style="width: 80px;" value="0">
          <button class="btn btn-modelo btn-finish flex-grow-1 fw-bold" (click)="abrirApontamento(maquinaParaIniciar!)">
            Apontar / Finalizar
          </button>
        </div>
      </div>
    </div>
  </div>
</div> ```
