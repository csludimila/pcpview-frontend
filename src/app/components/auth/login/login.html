<div class="login-container">
  <div class="neo-card">
    <h2>PCPView Login</h2>
    
    <input 
      type="email" 
      name="email"
      [(ngModel)]="credenciais.email" 
      placeholder="E-mail" 
      class="neo-input">

    <input 
      type="password" 
      name="senha"
      [(ngModel)]="credenciais.password" 
      placeholder="Senha" 
      class="neo-input"
      (keyup.enter)="onLogin()">

    <button (click)="onLogin()" class="neo-button">Entrar</button>
  </div>
</div>
