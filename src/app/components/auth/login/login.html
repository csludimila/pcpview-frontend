<div class="login-container">
  <div class="neo-card">
    <h2>PCPView Login</h2>
    <input type="email" [(ngModel)]="credenciais.email" placeholder="E-mail" class="neo-input">
    <input type="password" [(ngModel)]="credenciais.password" placeholder="Senha" class="neo-input">
    <button (click)="login()" class="neo-button">Entrar</button>
  </div>
</div>
