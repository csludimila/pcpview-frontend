<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <header class="mb-4 px-2">
        <h5 class="fw-bold text-white">🆕 Planejamento de Nova OF</h5>
        <hr style="border-color: rgba(255,255,255,0.1)">
      </header>

      <div class="card card-neumorphic border-0">
        <div class="card-body">
          <form (ngSubmit)="gerarProducao()">
            <div class="row">

              <div class="col-md-4 mb-3">
                <label class="form-label">OF Principal</label>
                <input type="text" class="form-control form-control-neumorphic" [(ngModel)]="novaOF.ofPrincipal"
                  name="ofPrincipal" placeholder="Ex: 1000" required>
              </div>

              <div class="col-md-5 mb-3">
                <label class="form-label">Produto</label>
                <input type="text" class="form-control form-control-neumorphic" [(ngModel)]="novaOF.produto"
                  name="produto" placeholder="Ex: Eixo de Transmissão">
              </div>

              <div class="col-md-3 mb-3">
                <label class="form-label">Quantidade</label>
                <input type="number" class="form-control form-control-neumorphic" [(ngModel)]="novaOF.quantidade"
                  name="quantidade" min="1" required>
              </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
              <button type="submit" class="btn-neumorphic px-5"
                [disabled]="!novaOF.ofPrincipal || novaOF.quantidade <= 0">
                🚀 Gerar Etapas de Produção
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Seção para listar os produtos vindos do Java -->
<div class="row justify-content-center mt-5">
  <div class="col-md-10">
    <header class="mb-4 px-2">
      <h5 class="fw-bold text-white">📋 Ordens no Sistema (Swagger)</h5>
      <hr style="border-color: rgba(255,255,255,0.1)">
    </header>

    <div class="card card-neumorphic border-0">
      <div class="card-body">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>SKU (OF)</th>
              <th>Nome do Produto</th>
              <th class="text-center">Ações</th>
            </tr>
          </thead>
          <tbody>
            <!-- O loop que busca os dados reais da API -->
            <tr *ngFor="let item of listaDeProdutos">
              <td><small>{{ item.id }}</small></td>
              <td><span class="badge bg-primary">{{ item.sku }}</span></td>
              <td>{{ item.nome }}</td>
              <td class="text-center">
                <button class="btn btn-sm btn-outline-warning border-0 me-2" (click)="visualizarProduto(item.id)">
                  👁️
                </button>
                <button class="btn btn-sm btn-outline-info border-0 me-2" (click)="editarProduto(item.id)"
                  title="Renomear Produto">
                  ✏️
                </button>

                <!-- Botão de Excluir (Lixeira) -->
                <button class="btn btn-sm btn-outline-danger border-0" (click)="deletarProduto(item.id)"
                  title="Excluir Produto">
                  🗑️
                </button>
              </td>
            </tr>
            <!-- Mensagem caso a lista esteja vazia -->
            <tr *ngIf="listaDeProdutos.length === 0">
              <td colspan="4" class="text-center text-muted py-4">
                Nenhum produto encontrado no banco H2.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
