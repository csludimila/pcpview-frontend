<<div class="card-maquina p-4" style="max-width: 600px; margin: auto;">
  <h5 class="fw-bold text-white mb-4">🏢 Planejamento (Nova OF)</h5>

  <div class="mb-3">
    <label class="form-label text-uppercase small opacity-50">Número da Ordem (OF / OP)</label>
    <input type="text" class="form-control-neumorphic" [(ngModel)]="novaOF.numeroOrdem" placeholder="Ex: OP-2026-001">
  </div>

  <div class="mb-3">
    <label class="form-label text-uppercase small opacity-50">Qtd. Solicitada</label>
    <input type="number" class="form-control-neumorphic" [(ngModel)]="novaOF.quantidadeTotal" min="1">
  </div>

  <div class="mb-4">
    <label class="form-label text-uppercase small opacity-50">Máquina Ideal (Opcional)</label>
    <select class="form-control-neumorphic" [(ngModel)]="novaOF.maquinaId">
      <option value="">-- QUALQUER MÁQUINA --</option>
      <option *ngFor="let m of listaDeMaquinas" [value]="m.id">{{ m.nome }}</option>
    </select>
  </div>

  <button class="btn btn-orange w-100 fw-bold py-3" (click)="gerarProducao()">
    Gerar Ordem de Serviço
  </button>
</div>
