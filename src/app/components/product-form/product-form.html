<div class="container mt-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card bg-dark text-white p-4 shadow-sm border-0">
        <h3 class="mb-3 text-uppercase fw-bold">Novo Produto</h3>
        <form [formGroup]="produtoForm" (ngSubmit)="onSalvar()">
          <div class="mb-3">
            <label class="form-label">ID do Produto</label>
            <input type="text" class="form-control" formControlName="id" placeholder="Ex: prod-123">
          </div>
          <div class="mb-3">
            <label class="form-label">SKU (Código Base)</label>
            <input type="text" class="form-control" formControlName="sku" placeholder="Ex: 1000">
          </div>
          <div class="mb-3">
            <label class="form-label">Nome do Produto</label>
            <input type="text" class="form-control" formControlName="nome" placeholder="Ex: Eixo Principal">
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold">Cadastrar Produto</button>
        </form>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card bg-dark text-white p-4 shadow-sm border-0">
        <h3 class="mb-3 text-uppercase fw-bold">Produtos Cadastrados (Banco H2)</h3>
        <table class="table table-dark table-striped m-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>SKU</th>
              <th>Nome</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of listaDeProdutos">
              <td>{{ p.id }}</td>
              <td>{{ p.sku }}</td>
              <td>{{ p.nome }}</td>
            </tr>
            <tr *ngIf="listaDeProdutos.length === 0">
              <td colspan="3" class="text-center text-muted">Nenhum produto encontrado no banco de dados.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
