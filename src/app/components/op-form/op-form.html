<div class="container mt-4">
  <div class="card border-0 shadow bg-dark text-white">
    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center p-3">
      <div class="d-flex align-items-center">
        <i class="bi bi-gear-fill fs-2 me-3 animate-spin"></i>
        <h2 class="m-0 text-uppercase fw-bold">IHM - Controle de Operação</h2>
      </div>
    </div>

    <div class="card-body p-4">
      <form [formGroup]="opForm">

        <div class="input-group mb-3">
          <span class="input-group-text bg-secondary text-white custom-label">Máquina</span>
          <select class="form-select" formControlName="idMaquina">
            <option value="">-- SELECIONE A MÁQUINA --</option>
            <option *ngFor="let m of listaDeMaquinas" [value]="m.id">{{ m.nome }}</option>
          </select>
        </div>
        <div class="input-group mb-4">
          <span class="input-group-text bg-secondary text-white custom-label">Ordem (Lote)</span>
          <select class="form-select" formControlName="idEtapaSubOrdem">
            <option value="">-- SELECIONE O LOTE DISPONÍVEL --</option>
            <option *ngFor="let o of listaDeOrdens" [value]="o.id">
              Lote: {{ o.subOrdemId }} - Status: {{ o.status }}
            </option>
          </select>
        </div>

        <div class="row g-2">
          <div class="col-md-4">
            <button type="button" class="btn btn-success btn-lg w-100 py-3 fw-bold" (click)="onIniciar()">
              ▶ INICIAR
            </button>
          </div>

          <div class="col-md-4">
            <button type="button" class="btn btn-warning btn-lg w-100 py-3 fw-bold text-white" (click)="onFinalizar()">
              ⏹ FINALIZAR
            </button>
          </div>

          <div class="col-md-4">
            <button type="button" class="btn btn-danger btn-lg w-100 py-3 fw-bold" (click)="onManutencao()">
              ⚠️ MANUTENÇÃO
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
