<div class="container mt-4">
  <div class="card border-0 shadow">
    <div class="card-header bg-dark-blue text-white d-flex justify-content-between align-items-center p-3">
      <div class="d-flex align-items-center">
        <i class="bi bi-clipboard-check fs-2 me-3"></i>
        <h2 class="m-0 text-uppercase fw-bold">Ordem de Produção</h2>
      </div>
    </div>

    <div class="card-body p-4">
      <form [formGroup]="opForm" (ngSubmit)="onSubmit()">
        
        <div class="input-group mb-3">
          <span class="input-group-text bg-dark-blue text-white custom-label">PV</span>
          <input type="text" class="form-control" formControlName="pv" placeholder="Ex: PV-001">
        </div>

        <div class="input-group mb-3">
          <span class="input-group-text bg-dark-blue text-white custom-label">Operador</span>
          <input type="text" class="form-control" formControlName="operador" placeholder="Nome do operador">
        </div>

        <div class="input-group mb-3">
          <span class="input-group-text bg-dark-blue text-white custom-label">Máquina</span>
          <select class="form-select" formControlName="maquina">
            <option value="">Selecione a máquina</option>
            <option value="Torno CNC 01">Torno CNC 01</option>
            <option value="Fresa 02">Fresa 02</option>
          </select>
        </div>

        <div class="input-group mb-3">
          <span class="input-group-text bg-dark-blue text-white custom-label">Status</span>
          <select class="form-select" formControlName="status">
            <option value="Aguardando">Aguardando</option>
            <option value="Em processamento">Em processamento</option>
            <option value="Finalizado">Finalizado</option>
          </select>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
          <button type="submit" class="btn btn-primary btn-lg px-5">SALVAR ORDEM</button>
        </div>

      </form>
    </div>
  </div>
</div>
